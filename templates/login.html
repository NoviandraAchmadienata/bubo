<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — BUBO STRAP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6fa;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    .login-wrap {
      display: flex;
      width: 100%;
      height: 100%;
    }
    /* Left Panel - Branding */
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
      animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .login-left::before {
      content: '';
      position: absolute;
      top: -20%; right: -10%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(249,162,53,0.15) 0%, transparent 70%);
    }
    .brand-large {
      font-size: 56px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }
    .brand-large span { color: #f9a235; }
    .tagline {
      font-size: 18px;
      font-weight: 600;
      color: #cbd5e1;
      max-width: 400px;
      line-height: 1.5;
      position: relative;
      z-index: 2;
    }
    .bottom-credit {
      position: absolute;
      bottom: 40px;
      left: 60px;
      font-size: 12px;
      color: #64748b;
      font-weight: 600;
    }

    /* Right Panel - Form */
    .login-right {
      width: 480px;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }
    .login-form-container {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }
    .login-title {
      font-size: 32px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .login-subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 40px;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: #334155;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      color: #0f172a;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #f9a235;
      box-shadow: 0 0 0 4px rgba(249,162,53,0.1);
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 38px;
      color: #94a3b8;
      width: 18px;
      height: 18px;
    }
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
    }
    .forgot-pass {
      font-size: 13px;
      font-weight: 800;
      color: #f9a235;
      text-decoration: none;
    }
    .forgot-pass:hover { text-decoration: underline; }
    
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #f9a235;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-login:hover { background: #e89225; }
    .btn-login:active { transform: scale(0.98); }

    @keyframes slideInLeft {
      from { transform: translateX(-50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 768px) {
      .login-left { display: none; }
      .login-right { width: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-left">
      <div class="brand-large">BUBO<br><span>STRAP</span></div>
      <div class="tagline">SISTEM MONITORING KESELAMATAN KONSTRUKSI BERBASIS AI & IOT</div>
      <div class="bottom-credit">&copy; 2026 BUBO STRAP. Hak Cipta Dilindungi.</div>
    </div>
    <div class="login-right">
      <div class="login-form-container">
        <h1 class="login-title">MASUK</h1>
        <p class="login-subtitle">Masukkan kredensial Anda untuk melanjutkan</p>
        
        <form class="login-form" action="/login" method="POST">
          {% if error %}
          <div style="background-color:#fee2e2;color:#b91c1c;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:600;text-align:center;">
            {{ error }}
          </div>
          {% endif %}
          <div class="form-group">
            <label class="form-label" for="username">USERNAME</label>
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <input type="text" id="username" name="username" class="form-input" placeholder="admin" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">KATA SANDI</label>
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox"> Ingat saya
            </label>
            <a href="#" class="forgot-pass">Lupa Sandi?</a>
          </div>

          <button type="submit" class="btn-login">MASUK KE DASHBOARD</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
